    .modal {
  display: none;
  position: fixed;
  z-index: 999;
  padding-top: 50px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
}
.modal img:active {
  transform: scale(1.2);
}
.modal img {
  display: block;
  margin: auto;
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}
    .carrusel {
  position: relative;
  width: 100%;
  overflow: hidden;
}

.carrusel-contenedor {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;

  /* 🔥 suavidad en celular */
  -webkit-overflow-scrolling: touch;

  /* 🔥 evita scroll vertical accidental */
  touch-action: pan-x;
}

.carrusel img {
  flex: 0 0 100%;
  scroll-snap-align: center;
  height: 300px;          /* 🔥 clave */
  object-fit: cover;      /* 🔥 evita deformación */
}
    .boton {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.6); /* transparente */
  color: white;
  border: none;
  width: 60px;        /* 🔥 tamaño fijo */
  height: 60px;
  cursor: pointer;
  font-size: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
