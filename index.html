<script>
function mover(direccion, id) {
  const carrusel = document.getElementById(id);
  const total = carrusel.children.length;

  let index = carrusel.dataset.index ? parseInt(carrusel.dataset.index) : 0;

  index += direccion;

  if (index < 0) index = total - 1;
  if (index >= total) index = 0;

  carrusel.dataset.index = index;

  const ancho = carrusel.children[0].clientWidth;
  carrusel.style.transform = `translateX(-${index * ancho}px)`;
}
</script>
  <script>
function abrirZoom(img) {
  const modal = document.getElementById("modal");
  const imgZoom = document.getElementById("imgZoom");

  modal.style.display = "block";
  imgZoom.src = img.src;
}

function cerrarZoom() {
  document.getElementById("modal").style.display = "none";
}
</script>
<div id="modal" class="modal" onclick="cerrarZoom()">
