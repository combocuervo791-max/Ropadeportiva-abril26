<script>
function mover(direccion, id) {
  const carrusel = document.getElementById(id);
  const total = carrusel.children.length;

  let index = carrusel.dataset.index ? parseInt(carrusel.dataset.index) : 0;

  index += direccion;

  if (index < 0) index = total - 1;
  if (index >= total) index = 0;

  carrusel.dataset.index = index;

  const ancho = carrusel.children[0].offsetWidth; // 🔥 mejor que clientWidth
  carrusel.style.transform = `translateX(-${index * ancho}px)`;
}
</script>
  <script>
function abrirZoom(img) {
  const modal = document.getElementById("modal");
  const imgZoom = document.getElementById("imgZoom");

  modal.style.display = "block";
  imgZoom.src = img.src;
}

function cerrarZoom() {
  document.getElementById("modal").style.display = "none";
}
</script>
<div id="modal" class="modal" onclick="cerrarZoom()">
  <img id="imgZoom">
</div>  
  <script>
let startX = 0;

document.querySelectorAll(".carrusel").forEach(c => {
  c.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  c.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    let id = c.querySelector(".carrusel-contenedor").id;

    if (startX - endX > 50) mover(1, id);
    if (endX - startX > 50) mover(-1, id);
  });
});
</script>
